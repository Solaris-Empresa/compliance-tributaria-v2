name: LLM Integration Gate

on:
  pull_request:
    paths:
      - 'server/lib/task-generator*'
      - 'server/lib/*generator*'
      - 'server/ai-helpers*'
      - 'server/_core/llm*'

jobs:
  extract-json-unit:
    name: extractJsonFromLLMResponse unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm vitest run server/lib/extract-json.test.ts

  llm-smoke:
    name: LLM integration smoke test
    runs-on: ubuntu-latest
    if: ${{ secrets.OPENAI_API_KEY != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run LLM integration tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: pnpm vitest run server/lib/task-generator-v4.integration.test.ts --timeout 120000
        continue-on-error: true
