name: Test Suite

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'CHANGELOG.md'

jobs:
  test-and-typecheck:
    name: TypeScript + Vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: TypeScript check
        run: pnpm exec tsc --noEmit
      - name: Run unit tests
        # CI-HYGIENE-02: era `pnpm test` (suite completa) com DATABASE_URL=prod →
        # testes de integração faziam db.insert(projects) e poluíam PRODUÇÃO a cada PR.
        # Agora roda só `test:unit` (sem DB). A integração roda LOCAL (`pnpm test`),
        # onde os testes DB-dependentes skipam graciosamente via dbDescribe (REGRA-ORQ-CI-01)
        # quando DATABASE_URL ausente. Sem staging (REGRA-E2E-PROD-01), CI não toca prod.
        run: pnpm test:unit
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      - name: Verify invariants
        run: pnpm vitest run server/prefill-contract.test.ts server/invariants-606-607-608.test.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
