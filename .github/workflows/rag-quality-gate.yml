name: RAG Quality Gate

# Bloqueia merge de PRs que toquem corpus/chunks/embeddings/retrieval
# sem evidências de qualidade preenchidas no body do PR.
# Referência: docs/governance/RAG-QUALITY-GATE.md

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    paths:
      - 'server/rag-retriever.ts'
      - 'server/routers/ragAdmin.ts'
      - 'server/routers/ragDocuments.ts'
      - 'drizzle/schema.ts'
      - 'scripts/ingest-*.ts'
      - 'scripts/chunk-*.ts'
      - 'scripts/embed-*.ts'
      - 'scripts/seed-rag*.ts'
      - 'scripts/seed-corpus*.ts'
      - 'docs/rag/CORPUS-BASELINE.md'
      - 'artifacts/rag-quality/**'
      - 'src/rag/**'
      - 'server/rag/**'

jobs:
  rag-quality-gate:
    name: RAG Quality Gate — Evidências Obrigatórias
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      statuses: write

    steps:
      - name: Verificar evidências de qualidade no PR body
        id: check-evidence
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const prNumber = context.payload.pull_request.number;

            // Gates obrigatórios — verificar se os checkboxes estão marcados
            const gates = {
              'RAG-Q1 anchor_id 100%':    /- \[x\] `anchor_id` 100% preenchido/i.test(body),
              'RAG-Q1 sem duplicatas':    /- \[x\] 0 duplicatas críticas/i.test(body),
              'RAG-Q2 gold set executado':/- \[x\] Executei o gold set/i.test(body),
              'RAG-Q2 sem regressão':     /- \[x\] Não houve regressão/i.test(body),
              'RAG-Q3 invisíveis':        /- \[x\] Verifiquei chunks invisíveis/i.test(body),
              'RAG-Q3 relatório':         /- \[x\] Relatório de invisibilidade anexado/i.test(body),
              'Resultado preenchido':     /Chunks afetados\s*\|\s*\S+/i.test(body),
            };

            const failed = Object.entries(gates).filter(([, v]) => !v);
            const passed = Object.entries(gates).filter(([, v]) => v);

            // Verificar se o PR body tem a seção de Gate RAG
            const hasGateSection = /Gate RAG — Evidências de Qualidade/i.test(body);

            if (!hasGateSection) {
              core.setFailed(
                '❌ RAG Quality Gate: seção "Gate RAG — Evidências de Qualidade" não encontrada no body do PR. ' +
                'Use o template `.github/PULL_REQUEST_TEMPLATE/rag-pr.md`.'
              );
              return;
            }

            // Construir relatório
            let report = '## RAG Quality Gate — Resultado\n\n';
            report += `> Referência: [\`docs/governance/RAG-QUALITY-GATE.md\`](../blob/main/docs/governance/RAG-QUALITY-GATE.md)\n\n`;

            if (passed.length > 0) {
              report += '### ✅ Gates aprovados\n';
              for (const [name] of passed) {
                report += `- ✅ ${name}\n`;
              }
              report += '\n';
            }

            if (failed.length > 0) {
              report += '### ❌ Gates pendentes (bloqueantes)\n';
              for (const [name] of failed) {
                report += `- ❌ ${name}\n`;
              }
              report += '\n';
              report += '**Este PR não pode ser mergeado até que todos os gates sejam preenchidos.**\n';
              report += 'Preencha os checkboxes no body do PR com as evidências de qualidade.\n';
            } else {
              report += '### ✅ Todos os gates aprovados — PR liberado para merge\n';
            }

            // Postar comentário no PR
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const botComment = comments.data.find(c =>
              c.user.type === 'Bot' && c.body.includes('RAG Quality Gate — Resultado')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: report,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: report,
              });
            }

            if (failed.length > 0) {
              core.setFailed(
                `❌ RAG Quality Gate: ${failed.length} gate(s) pendente(s): ` +
                failed.map(([n]) => n).join(', ')
              );
            } else {
              core.info('✅ RAG Quality Gate: todos os gates aprovados.');
            }

      - name: Verificar artefato de evidência
        id: check-artifact
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const prNumber = context.payload.pull_request.number;

            // Verificar se o artefato report.md foi mencionado ou criado
            const hasArtifact = /artifacts\/rag-quality\/\d+\/report\.md/i.test(body) ||
                                 /artifacts\/rag-quality\/report/i.test(body);

            if (!hasArtifact) {
              core.warning(
                `⚠️ RAG Quality Gate: artefato de evidência não encontrado. ` +
                `Crie artifacts/rag-quality/${prNumber}/report.md conforme RAG-QUALITY-GATE.md §5.`
              );
            } else {
              core.info('✅ Artefato de evidência referenciado no PR.');
            }
