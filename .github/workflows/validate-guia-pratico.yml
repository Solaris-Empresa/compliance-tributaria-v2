name: Validate Guia Prático (ADR-GP-001)

# A3 — Triade ORQ-28 (Artefato 3). Gate específico da feature "Guia Prático".
# Dispara SÓ em PRs com label `guia-pratico-impl` (escape hatch — outros PRs imunes).
# Inclui `labeled` no trigger (lição do #1378 — sem isso o gate não re-roda ao aplicar o label).

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

jobs:
  validate-guia-pratico:
    name: "Validate Guia Prático"
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'guia-pratico-impl')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Test-contracts (A2) — determinístico, sempre roda ──────────────────
      - name: Run schema test-contracts (A2)
        run: pnpm vitest run server/schemas/guia-pratico.schemas.test.ts --reporter=verbose

      # ── Greps de governança da Spec Técnica (ADR-GP-001) ───────────────────
      - name: Backend usa protectedProcedure (NÃO publicProcedure)
        run: |
          F=server/routers/guia-pratico.ts
          if [ ! -f "$F" ]; then echo "❌ $F ausente"; exit 1; fi
          grep -q "protectedProcedure" "$F" || { echo "❌ falta protectedProcedure"; exit 1; }
          if grep -q "publicProcedure" "$F"; then echo "❌ publicProcedure proibido (auth)"; exit 1; fi
          echo "✅ protectedProcedure"

      - name: Backend usa invokeLLM (NÃO openai direto) + temperature <= 0.1
        run: |
          F=server/routers/guia-pratico.ts
          grep -q "invokeLLM" "$F" || { echo "❌ deve usar invokeLLM, não openai direto"; exit 1; }
          if grep -qE "temperature:\s*0\.(1[1-9]|[2-9])" "$F"; then echo "❌ temperature > 0.1 (REGRA-ORQ-30)"; exit 1; fi
          echo "✅ invokeLLM + temperature <= 0.1"

      - name: Schema AZ-01 consumido pelo procedure
        run: |
          grep -q "guiaPraticoResponseSchema" server/routers/guia-pratico.ts || { echo "❌ procedure não valida com guiaPraticoResponseSchema"; exit 1; }
          echo "✅ schema consumido"

      - name: Frontend — componentes do botão/modal presentes
        run: |
          for f in client/src/components/briefing/GuiaPraticoButton.tsx client/src/components/GuiaPraticoButton.tsx; do [ -f "$f" ] && FOUND_BTN=1; done
          [ -n "$FOUND_BTN" ] || { echo "❌ GuiaPraticoButton.tsx ausente"; exit 1; }
          find client/src -name "GuiaPraticoModal.tsx" | grep -q . || { echo "❌ GuiaPraticoModal.tsx ausente"; exit 1; }
          echo "✅ componentes presentes"

      - name: Read-only — sem migration nova na feature
        run: |
          # B-08: a feature não gera migration. PR de impl não deve adicionar drizzle/*.sql.
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E "^drizzle/.*\.sql$"; then
            echo "❌ feature read-only não pode adicionar migration (.sql)"; exit 1; fi
          echo "✅ sem migration"

      - name: Disclaimer ilustrativo presente (D-2)
        run: |
          # Disclaimer obrigatório em tela E PDF (ADR-GP-001 D-2).
          if ! grep -rqi "não substitui análise jurídica\|orientativo\|ilustrativo" client/src; then
            echo "❌ disclaimer ilustrativo ausente na UI"; exit 1; fi
          echo "✅ disclaimer presente"
