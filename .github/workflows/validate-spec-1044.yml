name: spec-1044-artigo-principal-contracts

# Artefato 3 da Triade REGRA-ORQ-28 para Issue #1044 (P0)
#
# Garante que os 33 test contracts de
# server/lib/rag-risk-validator-artigo-principal.test.ts
# permaneçam alinhados com server/lib/rag-risk-validator.ts.
#
# Comportamento esperado:
# - Enquanto todos forem `it.todo()` (Artefato 2 — skeleton): tests passam como skip.
# - Quando algum `it.todo()` for convertido para `it()` real (Artefato 4 — implementação):
#   o source rag-risk-validator.ts DEVE conter os tokens da implementação Opção B
#   aprovada pelo P.O. em 2026-05-09:
#
#       rag_artigo_exato = chunks
#         .filter(c => normalizeArtigo(c.artigo) === normalizeArtigo(risk.artigo))
#         [0]?.artigo ?? risk.artigo
#
# Caso contrário, o CI falha — bloqueando merge de implementação parcial.

on:
  pull_request:
    paths:
      - "server/lib/rag-risk-validator*.ts"
      - ".github/workflows/validate-spec-1044.yml"
  push:
    branches: [main]
    paths:
      - "server/lib/rag-risk-validator*.ts"

permissions:
  contents: read

concurrency:
  group: spec-1044-${{ github.ref }}
  cancel-in-progress: true

jobs:
  spec-1044-artigo-principal-contracts:
    name: spec-1044-artigo-principal-contracts
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run spec-1044 test contracts
        run: |
          pnpm vitest run server/lib/rag-risk-validator-artigo-principal.test.ts

      - name: Verify it.todo → it() pairing with source
        run: |
          set -euo pipefail
          TEST_FILE="server/lib/rag-risk-validator-artigo-principal.test.ts"
          SRC_FILE="server/lib/rag-risk-validator.ts"

          if [ ! -f "$TEST_FILE" ]; then
            echo "❌ Arquivo de test contracts ausente: $TEST_FILE"
            echo "   Esperado: 33 it.todo() do Artefato 2 (PR #1051)"
            exit 1
          fi
          if [ ! -f "$SRC_FILE" ]; then
            echo "❌ Source ausente: $SRC_FILE"
            exit 1
          fi

          # Conta it.todo() — pendentes (skeleton Artefato 2)
          TODO_COUNT=$(grep -cE "it\.todo\(" "$TEST_FILE" || true)

          # Conta it( real — implementados (Artefato 4)
          # Regex captura `it(` ou `  it(` mas NÃO `it.todo(`, `it.skip(`, `it.only(`
          REAL_COUNT=$(grep -cE "^\s*it\(" "$TEST_FILE" || true)

          echo "📋 it.todo() pendentes: $TODO_COUNT"
          echo "📋 it() reais:          $REAL_COUNT"

          if [ "$REAL_COUNT" -gt 0 ]; then
            # Pelo menos 1 contrato foi implementado.
            # Source DEVE conter tokens da implementação Opção B aprovada.
            if ! grep -qE "normalizeArtigo|filter\([^)]*\.artigo\b" "$SRC_FILE"; then
              echo ""
              echo "❌ FALHA: Issue #1044 (Opção B) — test contracts foram convertidos"
              echo "   de it.todo() para it() reais, mas $SRC_FILE NÃO contém"
              echo "   implementação correspondente."
              echo ""
              echo "  Tokens esperados (qualquer um):"
              echo "    - normalizeArtigo(...)"
              echo "    - .filter(c => normalizeArtigo(c.artigo) === ...)"
              echo ""
              echo "  Spec aprovada P.O. (2026-05-09):"
              echo "    rag_artigo_exato = chunks"
              echo "      .filter(c => normalizeArtigo(c.artigo) === normalizeArtigo(risk.artigo))"
              echo "      [0]?.artigo ?? risk.artigo  // fallback nunca null"
              echo ""
              echo "  Conserte: implemente em $SRC_FILE OU reverta it() → it.todo()"
              echo "  no PR de implementação (label 1044-impl)."
              exit 1
            fi
            echo "✅ $REAL_COUNT contrato(s) it() real(is) detectado(s) E source contém"
            echo "   tokens da Opção B (normalizeArtigo / filter pelo artigo)."
          else
            echo "✅ Todos os $TODO_COUNT contratos permanecem como it.todo() — skeleton"
            echo "   fase Artefato 2. Implementação Opção B aguarda PR 1044-impl."
          fi
