name: 🔍 Validate Implementation — Gates Q6/Q7/R9/R10

# Gate 2 — Q6/Q7 + Gate 1.5 — R9/R10
# Sistema de Engenharia de Qualidade v5.0
# Ref: docs/GATES-DOCUMENTACAO-COMPLETA-v5.md

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'server/**'
      - 'client/**'

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # JOB 1: Q7 — Driver único (sem mistura Drizzle ORM + raw SQL no mesmo arquivo)
  # Gate 2 Q7 — BLOQUEIA PR se violação detectada
  # ─────────────────────────────────────────────────────────────────────────
  validate-q7-driver-unique:
    name: "Q7 — Driver único (sem mistura ORM + raw SQL)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detectar mistura de drivers no mesmo arquivo
        run: |
          VIOLATIONS=""
          for file in $(find server -name "*.ts" -not -name "*.test.ts" -not -path "*/node_modules/*"); do
            HAS_ORM=$(grep -c "\.insert(\|\.update(\|\.delete(\|\.select(" "$file" 2>/dev/null || echo 0)
            HAS_RAW=$(grep -c "conn\.execute\|pool\.execute\|db\.execute(sql" "$file" 2>/dev/null || echo 0)
            if [ "$HAS_ORM" -gt 0 ] && [ "$HAS_RAW" -gt 0 ]; then
              VIOLATIONS="$VIOLATIONS\n  ❌ $file (ORM: $HAS_ORM, raw: $HAS_RAW)"
            fi
          done
          if [ -n "$VIOLATIONS" ]; then
            echo "❌ Q7 BLOQUEADO — Mistura de drivers detectada:"
            echo -e "$VIOLATIONS"
            echo ""
            echo "Regra: cada arquivo deve usar OU Drizzle ORM OU raw SQL — nunca ambos."
            echo "Ref: Gate 2 Q7 — docs/GATES-DOCUMENTACAO-COMPLETA-v5.md"
            exit 1
          fi
          echo "✅ Q7 OK — Nenhuma mistura de drivers detectada"

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2: Q6 — Retorno explícito (funções async em server/lib/ não retornam void)
  # Gate 2 Q6 — AVISA (não bloqueia) — P.O. confirma manualmente
  # ─────────────────────────────────────────────────────────────────────────
  validate-q6-return-explicit:
    name: "Q6 — Retorno explícito em server/lib/"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verificar funções async sem retorno explícito em server/lib/
        run: |
          WARNINGS=""
          for file in $(find server/lib -name "*.ts" -not -name "*.test.ts" 2>/dev/null); do
            # Detecta funções async que declaram Promise<void>
            VOID_FUNS=$(grep -n "async.*Promise<void>\|async.*): void" "$file" 2>/dev/null || true)
            if [ -n "$VOID_FUNS" ]; then
              WARNINGS="$WARNINGS\n  ⚠️  $file:\n$VOID_FUNS"
            fi
          done
          if [ -n "$WARNINGS" ]; then
            echo "⚠️  Q6 AVISO — Funções async com retorno void em server/lib/:"
            echo -e "$WARNINGS"
            echo ""
            echo "Recomendação: retornar { inserted: N } ou { ok: boolean } para validação via SELECT."
            echo "Ref: Gate 2 Q6 — docs/GATES-DOCUMENTACAO-COMPLETA-v5.md"
            echo "Este job não bloqueia o PR — P.O. confirma manualmente."
          else
            echo "✅ Q6 OK — Nenhuma função void detectada em server/lib/"
          fi

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 3: R9 — Observabilidade (funções de persistência emitem evento estruturado)
  # Gate 1.5 R9 — AVISA se ausente
  # ─────────────────────────────────────────────────────────────────────────
  validate-r9-observability:
    name: "R9 — Observabilidade em funções de persistência"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verificar eventos estruturados em server/lib/
        run: |
          WARNINGS=""
          for file in $(find server/lib -name "*.ts" -not -name "*.test.ts" 2>/dev/null); do
            HAS_INSERT=$(grep -c "\.execute\|\.insert\|INSERT INTO" "$file" 2>/dev/null || echo 0)
            HAS_LOG=$(grep -c "console\.log\|console\.error\|JSON\.stringify" "$file" 2>/dev/null || echo 0)
            if [ "$HAS_INSERT" -gt 0 ] && [ "$HAS_LOG" -eq 0 ]; then
              WARNINGS="$WARNINGS\n  ⚠️  $file (inserts: $HAS_INSERT, logs: 0)"
            fi
          done
          if [ -n "$WARNINGS" ]; then
            echo "⚠️  R9 AVISO — Funções de persistência sem logging estruturado:"
            echo -e "$WARNINGS"
            echo ""
            echo "Padrão obrigatório (v5.0):"
            echo '  console.log(JSON.stringify({ event: "modulo.operacao.iniciada", projectId, ts: Date.now() }));'
            echo '  console.log(JSON.stringify({ event: "modulo.operacao.concluida", projectId, inserted: N }));'
            echo '  console.error(JSON.stringify({ event: "modulo.operacao.falhou", projectId, error: String(err) }));'
            echo ""
            echo "Ref: Gate 1.5 R9 — docs/GATES-DOCUMENTACAO-COMPLETA-v5.md"
            echo "Este job não bloqueia o PR — P.O. confirma manualmente."
          else
            echo "✅ R9 OK — Logging estruturado detectado em todas as funções de persistência"
          fi

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 4: R2 — Atomicidade (DELETE + INSERT sem transação)
  # Gate 1.5 R2 — BLOQUEIA PR se violação detectada
  # ─────────────────────────────────────────────────────────────────────────
  validate-r2-atomicity:
    name: "R2 — DELETE + INSERT em transação"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detectar DELETE + INSERT sem transação em server/lib/
        run: |
          VIOLATIONS=""
          for file in $(find server/lib -name "*.ts" -not -name "*.test.ts" 2>/dev/null); do
            HAS_DELETE=$(grep -c "DELETE FROM\|\.delete(" "$file" 2>/dev/null || echo 0)
            HAS_INSERT=$(grep -c "INSERT INTO\|\.insert(" "$file" 2>/dev/null || echo 0)
            HAS_TX=$(grep -c "transaction\|BEGIN\|COMMIT\|ROLLBACK\|await db\.transaction\|await conn\.beginTransaction" "$file" 2>/dev/null || echo 0)
            if [ "$HAS_DELETE" -gt 0 ] && [ "$HAS_INSERT" -gt 0 ] && [ "$HAS_TX" -eq 0 ]; then
              VIOLATIONS="$VIOLATIONS\n  ❌ $file (DELETE: $HAS_DELETE, INSERT: $HAS_INSERT, TX: 0)"
            fi
          done
          if [ -n "$VIOLATIONS" ]; then
            echo "❌ R2 BLOQUEADO — DELETE + INSERT sem transação detectados:"
            echo -e "$VIOLATIONS"
            echo ""
            echo "Regra: toda operação DELETE + INSERT deve estar em transação para garantir atomicidade."
            echo "Ref: Gate 1.5 R2 — docs/GATES-DOCUMENTACAO-COMPLETA-v5.md"
            exit 1
          fi
          echo "✅ R2 OK — Todas as operações DELETE+INSERT estão em transação"
